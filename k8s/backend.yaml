apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mean-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: moizaman/mean-task-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        env:
        - name: DB_URL
          valueFrom:
            secretKeyRef:
              name: mean-app-secret
              key: DB_URL
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: mean-app-config
              key: PORT
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mean-app
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
