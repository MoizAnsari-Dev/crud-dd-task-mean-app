apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: mean-app
data:
  default.conf: |
    server {
        listen 80;

        # Route /api directly to the backend service
        location /api/ {
            proxy_pass http://backend:8080/api/;
            proxy_set_header Host $host;
        }

        # Route everything else to the Angular frontend
        location / {
            proxy_pass http://frontend:8081/;
            proxy_set_header Host $host;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: mean-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config-volume
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: mean-app
spec:
  type: LoadBalancer
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
