<div>
  <div class="submit-form modern-card mx-auto" style="max-width: 500px; margin-top: 2rem;">
    <h4 class="mb-4" style="color: var(--primary); font-weight: 600;" *ngIf="!submitted">Create Tutorial</h4>

    <div *ngIf="!submitted">
      <div class="form-group mb-4">
        <label for="title" class="text-muted font-weight-bold mb-2">Title</label>
        <input type="text" class="form-control modern-input" id="title" placeholder="e.g. Master Angular 15" required
          [(ngModel)]="tutorial.title" name="title" />
      </div>

      <div class="form-group mb-4">
        <label for="description" class="text-muted font-weight-bold mb-2">Description</label>
        <textarea class="form-control modern-input" id="description" placeholder="What is this tutorial about?" rows="3"
          required [(ngModel)]="tutorial.description" name="description"></textarea>
      </div>

      <button (click)="saveTutorial()" class="btn-modern w-100 mt-2">Submit Tutorial</button>
    </div>

    <div *ngIf="submitted" class="text-center py-4">
      <div class="mb-3">
        <svg style="width: 48px; height: 48px; color: #10b981;" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <h4 class="mb-4" style="color: var(--text-main);">Tutorial was submitted successfully!</h4>
      <button class="btn-modern" (click)="newTutorial()">Add Another Tutorial</button>
    </div>
  </div>
</div>
