<div class="notion-container">
  <!-- Content Area -->
  <div class="notion-editor-wrapper" *ngIf="!submitted">

    <!-- Top Action Bar -->
    <div class="notion-top-bar d-flex justify-content-between align-items-center mb-4">
      <div class="text-muted" style="font-size: 0.85rem;">
        {{ getWordCount(tutorial.description) }} words
      </div>
      <button class="notion-save-btn" [disabled]="!tutorial.title || tutorial.title.trim() === ''"
        (click)="saveTutorial()">
        Save Entry
      </button>
    </div>

    <!-- Title Area (Looks like H1) -->
    <div class="notion-title-block mb-3">
      <input type="text" class="notion-title-input" placeholder="Untitled" autocomplete="off"
        [(ngModel)]="tutorial.title" name="title" />
    </div>

    <!-- Body Area (Looks like blank page) -->
    <div class="notion-body-block">
      <textarea class="notion-body-input" placeholder="Press Enter to continue with an empty page, or start typing..."
        rows="15" [(ngModel)]="tutorial.description" name="description"></textarea>
    </div>
  </div>

  <!-- Success State -->
  <div *ngIf="submitted" class="notion-success-state text-center py-5 mt-5">
    <div class="mb-4 d-flex justify-content-center">
      <div class="success-icon-wrapper">
        <svg style="width: 32px; height: 32px; color: var(--foreground);" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
    </div>
    <h3 class="mb-3 font-weight-700" style="color: var(--foreground); letter-spacing: -0.02em;">Saved securely to your
      journal.</h3>

    <button class="notion-btn-secondary mt-3" (click)="newTutorial()">
      <svg style="width: 16px; height: 16px; margin-right: 6px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      New page
    </button>
  </div>
</div>
