version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-server
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - mean-network
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USERNAME:-yourusername}/mean-task-backend:latest
    build: ./backend
    container_name: mean-backend
    ports:
      - "8080"
    environment:
      - DB_URL=mongodb://mongodb:27017/dd_db
    depends_on:
      - mongodb
    networks:
      - mean-network
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME:-yourusername}/mean-task-frontend:latest
    build: ./frontend
    container_name: mean-frontend
    ports:
      - "8081"
    depends_on:
      - backend
    networks:
      - mean-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: mean-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - mean-network
    restart: unless-stopped

networks:
  mean-network:
    driver: bridge

volumes:
  mongodb-data:
